<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎮 멀티게임 라운지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{--bg:#eef1f6;--card:#ffffff;--card2:#f4f6fa;--line:#e7eaf1;--text:#242936;
  --soft:#5f6b80;--mute:#97a1b4;--cyan:#12b5a6;--coral:#ff6b5e;--ok:#14a56f;
  --wood1:#e0b477;--wood2:#c08c4a;--sans:'Pretendard Variable',Pretendard,system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(1100px 700px at 70% -10%,#ffffff 0%,var(--bg) 62%);color:var(--text);
  font-family:var(--sans);min-height:100vh}
.wrap{max-width:1060px;margin:0 auto;padding:20px 16px}
header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
header h1{font-size:20px;font-weight:800}
header .tag{font-size:10px;letter-spacing:.12em;color:var(--cyan);border:1px solid rgba(18,181,166,.4);
  background:#fff;padding:3px 9px;border-radius:999px;text-transform:uppercase;font-weight:700}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;
  box-shadow:0 12px 32px -20px rgba(35,48,74,.22)}
.hidden{display:none!important}
/* ---- lobby ---- */
#lobby{max-width:460px;margin:6vh auto 0}
#lobby h2{font-size:16px;font-weight:800;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;color:var(--soft);margin-bottom:6px}
input[type=text]{width:100%;background:#fff;border:1.5px solid var(--line);border-radius:12px;
  color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 13px;outline:none}
input[type=text]:focus{border-color:rgba(18,181,166,.6)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;border:none;
  font-family:var(--sans);font-weight:700;font-size:13.5px;border-radius:12px;padding:11px 16px;
  background:#eef1f7;color:var(--text);border:1.5px solid #cdd5e3;box-shadow:0 2px 6px -3px rgba(35,48,74,.25);
  transition:filter .12s,background .12s}
.btn:hover{background:#e3e8f1}
.btn.primary{background:linear-gradient(135deg,#17c7b2,#0fa093);border:none;color:#fff;box-shadow:0 6px 16px -8px rgba(18,181,166,.55)}
.btn.coral{background:linear-gradient(135deg,#ff8a76,#f4604f);border:none;color:#fff;box-shadow:0 6px 16px -8px rgba(255,107,94,.55)}
.btn.mango{background:linear-gradient(135deg,#ffc06a,#f59e0b);border:none;color:#fff;box-shadow:0 6px 16px -8px rgba(245,158,11,.55)}
.btn.mango:hover{filter:brightness(1.05);background:linear-gradient(135deg,#ffc06a,#f59e0b)}
.btn.leave{background:#fff1ef;border:1.5px solid rgba(255,107,94,.55);color:#e2544a}
.btn.leave:hover{background:#ffe4e0}
.btn.tealout{background:#ecf9f7;border:1.5px solid rgba(18,181,166,.5);color:#0d9488}
.btn.tealout:hover{background:#dcf3ef}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
.row{display:flex;gap:9px}.row>*{flex:1}
.row.actions{flex-wrap:wrap}
.row.actions>*{flex:0 1 auto}
.row.actions .btn{padding:9px 14px}
.games{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0 18px}
.gitem{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--line);
  border-radius:14px;padding:11px 13px;font-size:13px;font-weight:700;box-shadow:0 4px 12px -8px rgba(35,48,74,.15)}
.gitem .soon{margin-left:auto;font-size:9.5px;color:var(--mute);border:1px solid var(--line);
  padding:2px 7px;border-radius:999px;font-weight:800}
.gitem.on{border-color:rgba(20,165,111,.35)}
.gitem.on .soon{color:var(--ok);border-color:rgba(20,165,111,.4);background:rgba(20,165,111,.07)}
button.gitem{font-family:var(--sans);color:var(--text);text-align:left;cursor:pointer}
button.gitem:hover{border-color:rgba(18,181,166,.5)}
.gitem.sel{outline:2.5px solid var(--coral);outline-offset:1.5px}
/* ---- draw mode ---- */
.wordbar{display:flex;align-items:center;gap:10px;width:100%;background:#fff;border:1.5px solid var(--line);
  border-radius:12px;padding:9px 14px;font-weight:800;font-size:15px;letter-spacing:.14em;
  box-shadow:0 4px 12px -8px rgba(35,48,74,.15)}
.wordbar #timer{margin-left:auto;letter-spacing:0;color:var(--coral);font-size:13.5px;white-space:nowrap}
.tools{display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap}
.tools .sw{width:26px;height:26px;border-radius:50%;border:2px solid rgba(0,0,0,.14);cursor:pointer;padding:0;
  box-shadow:0 2px 5px rgba(35,48,74,.18)}
.tools .sw.on{outline:2.5px solid var(--coral);outline-offset:1.5px}
.tools .wd{width:36px;height:27px;border-radius:8px;background:#fff;border:1.5px solid var(--line);
  cursor:pointer;color:var(--soft);display:flex;align-items:center;justify-content:center;padding:0}
.tools .wd.on{border-color:var(--coral);color:var(--text)}
.scores{display:flex;flex-direction:column;gap:6px}
.scores .sc{display:flex;gap:8px;align-items:center;background:var(--card2);border:1.5px solid var(--line);
  border-radius:10px;padding:7px 11px;font-size:12.5px;font-weight:700}
.scores .sc .pt{margin-left:auto;color:var(--cyan);font-weight:800}
.scores .sc.off{opacity:.45}
.scores .sc.drawer{border-color:rgba(255,107,94,.5);background:rgba(255,107,94,.05)}
/* ---- game ---- */
#game{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px}
@media(max-width:820px){#game{grid-template-columns:1fr}}
.boardcard{display:flex;flex-direction:column;align-items:center;gap:12px}
#board{border-radius:14px;box-shadow:0 14px 34px -16px rgba(35,48,74,.4);cursor:pointer;touch-action:none;
  -webkit-user-select:none;user-select:none;max-width:100%;height:auto}
.topbar{display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap}
.codechip{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);
  border-radius:999px;padding:7px 14px;font-size:13px;font-weight:800;letter-spacing:.14em;color:var(--cyan)}
.codechip small{letter-spacing:0;font-weight:700;color:var(--mute)}
#turnmsg{margin-left:auto;font-size:13px;font-weight:700;color:var(--soft)}
#turnmsg.me{color:var(--ok)}
#turnmsg.win{color:var(--coral)}
.side{display:flex;flex-direction:column;gap:12px;min-height:0}
.pl{display:flex;align-items:center;gap:10px;background:var(--card2);border:1.5px solid var(--line);
  border-radius:12px;padding:9px 12px;font-size:13px;font-weight:700}
.pl .stone{width:18px;height:18px;border-radius:50%;flex:none;border:1px solid rgba(0,0,0,.18);
  box-shadow:0 2px 4px rgba(35,48,74,.2)}
.pl .stone.b{background:radial-gradient(circle at 34% 30%,#5a5a66,#0a0a10)}
.pl .stone.w{background:radial-gradient(circle at 34% 30%,#ffffff,#c9ccd6)}
.pl .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl .st{margin-left:auto;font-size:10.5px;color:var(--mute)}
.pl.turn{border-color:rgba(20,165,111,.55);background:rgba(20,165,111,.05)}
.pl.me .nm::after{content:" (나)";color:var(--cyan);font-size:11px}
.pl .pj{flex:0 0 auto;font-family:var(--sans);font-size:10.5px;font-weight:700;padding:4px 9px;
  border-radius:8px;background:#fff;border:1px solid rgba(18,181,166,.45);color:var(--cyan);cursor:pointer}
.pl .pj:hover{filter:brightness(1.2)}
/* alka 삑 slider */
.wob{display:flex;align-items:center;gap:7px;background:#eef1f7;border:1.5px solid #cdd5e3;
  border-radius:12px;padding:6px 11px;font-size:12.5px;font-weight:800;color:var(--text);white-space:nowrap}
.wob input[type=range]{width:88px;accent-color:var(--coral);cursor:pointer}
.wob input[type=range]:disabled{opacity:.4;cursor:not-allowed}
.wob #wobVal{min-width:38px;color:var(--coral)}
.wob.locked{opacity:.65}
#watch{font-size:11px;color:var(--mute);text-align:right}
#log{flex:1;background:var(--card2);border:1.5px solid var(--line);border-radius:12px;
  padding:10px 12px;overflow-y:auto;font-size:12.5px;line-height:1.55;min-height:180px;max-height:320px}
#log .sys{color:var(--mute);font-size:11.5px}
#log .nm{font-weight:800;color:var(--coral)}
.chatrow{display:flex;gap:7px}
.chatrow input{flex:1}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>🎮 멀티게임 라운지</h1><span class="tag">phyksw · rooms · v0.17</span></header>

  <!-- lobby -->
  <div id="lobby" class="card">
    <h2>친구랑 같이 하는 미니게임</h2>
    <div class="games" id="gamesList">
      <button type="button" class="gitem on sel" data-mode="omok">⚫ 오목 <span class="soon">PLAY</span></button>
      <button type="button" class="gitem on" data-mode="draw">🎨 그림 맞추기 <span class="soon">PLAY</span></button>
      <button type="button" class="gitem on" data-mode="alka">🥌 알까기 <span class="soon">PLAY</span></button>
      <button type="button" class="gitem on" data-mode="beat">🎵 리듬 <span class="soon">PLAY</span></button>
      <button type="button" class="gitem on" data-mode="tet">🧱 테트리스 <span class="soon">PLAY</span></button>
      <div class="gitem">🗺️ 땅따먹기 <span class="soon">준비중</span></div>
    </div>
    <div class="field"><label>닉네임</label><input type="text" id="nick" maxlength="12" placeholder="예: 김선장"></div>
    <div class="field"><label>방 코드 (입장할 때만)</label><input type="text" id="code" maxlength="8" placeholder="예: A3K9F" style="text-transform:uppercase"></div>
    <div class="row">
      <button class="btn primary" id="btnNew">+ 새 방 만들기</button>
      <button class="btn tealout" id="btnJoin">방 입장</button>
    </div>
  </div>

  <!-- game -->
  <div id="game" class="hidden">
    <div class="card boardcard">
      <div class="topbar">
        <span class="codechip"><small>ROOM</small> <span id="roomcode"></span></span>
        <button class="btn tealout" id="btnCopy" style="padding:7px 12px;font-size:12px">🔗 초대링크 복사</button>
        <span id="turnmsg"></span>
      </div>
      <div class="wordbar hidden" id="wordbar"><span id="wordtxt"></span><span id="timer"></span></div>
      <canvas id="board" width="600" height="600"></canvas>
      <div class="tools hidden" id="tools"></div>
      <div class="tools hidden" id="tpad"></div>
      <div class="row actions" style="width:100%">
        <button class="btn primary hidden" id="btnBegin">🎨 라운드 시작</button>
        <button class="btn mango hidden" id="btnSolo" title="상대 없이 혼자 양쪽을 다 조작합니다">🙋 혼자 두기</button>
        <div class="wob hidden" id="wobBox">🎯 삑
          <input type="range" id="wobRange" min="0" max="15" step="1" value="0">
          <span id="wobVal">정확</span></div>
        <button class="btn coral hidden" id="btnRestart" title="흑백(선공)을 교대해서 새 판을 시작합니다">↻ 새 판</button>
        <button class="btn leave" id="btnLeave" style="margin-left:auto">🚪 나가기</button>
      </div>
    </div>
    <div class="card side">
      <div class="pl" id="pl1"><span class="stone b"></span><span class="nm">—</span><button type="button" class="pj hidden" data-side="1">+팀참가</button><span class="st"></span></div>
      <div class="pl" id="pl2"><span class="stone w"></span><span class="nm">—</span><button type="button" class="pj hidden" data-side="2">+팀참가</button><span class="st"></span></div>
      <div class="scores hidden" id="scores"></div>
      <div id="watch"></div>
      <div id="log"></div>
      <div class="chatrow"><input type="text" id="chat" maxlength="200" placeholder="채팅…"><button class="btn" id="btnSend" style="flex:0 0 auto">전송</button></div>
    </div>
  </div>
</div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const SIZE=15, CELLS=SIZE*SIZE;

/* ---- identity ---- */
$('nick').value = localStorage.getItem('gname') || '';
/* localStorage (not session): re-opening the invite link in a NEW tab must reclaim my seat */
if(!localStorage.getItem('gtoken')) localStorage.setItem('gtoken', crypto.randomUUID());
const TOKEN = localStorage.getItem('gtoken');

/* ---- state ---- */
let ws=null, room=null, myRole=0, board=new Array(CELLS).fill(0),
    turn=1, winner=0, winLine=null, seats={1:null,2:null}, lastMove=-1, inGame=false,
    retry=0, reconnT=null, pingT=null;
let MODE='omok', selMode='omok', timerIv=null,
    DRAW={phase:'lobby',roundEnd:0,youDrawer:false,word:null,mask:''},
    tool={c:0,w:4},
    AL={stones:[],turn:1,winner:0,phase:'idle',auth:'[]',mine:false},
    BEAT=null,   // set by initBeat()
    SOLO=false, YOUIDX=0,   // solo (one player, both seats) / my member index within my team
    TET=null;               // set by initTet()

/* ---- lobby ---- */
const CODE_CHARS='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
const newCode=()=>Array.from({length:5},()=>CODE_CHARS[Math.random()*CODE_CHARS.length|0]).join('');
function myName(){ const n=$('nick').value.trim().slice(0,12); if(!n){ $('nick').focus(); return null; }
  localStorage.setItem('gname',n); return n; }
document.querySelectorAll('#gamesList button.gitem').forEach(b=>{
  b.onclick=()=>{ selMode=b.dataset.mode;
    document.querySelectorAll('#gamesList .gitem').forEach(x=>x.classList.toggle('sel',x===b)); };
});
$('btnNew').onclick=()=>{ if(!myName())return; enter(newCode()); };
$('btnJoin').onclick=()=>{ if(!myName())return; const c=$('code').value.trim().toUpperCase();
  if(!/^[A-Z0-9]{4,8}$/.test(c)){ $('code').focus(); return; } enter(c); };
$('code').addEventListener('keydown',e=>{ if(e.key==='Enter') $('btnJoin').click(); });

function enter(code){ room=code; location.hash=code; inGame=true;
  board=new Array(CELLS).fill(0); turn=1; winner=0; winLine=null; lastMove=-1; hover=-1;   // reset per-room state
  seats={1:null,2:null}; myRole=0; retry=0; SOLO=false; YOUIDX=0; clearReconn(); $('log').innerHTML='';
  DRAW={phase:'lobby',roundEnd:0,youDrawer:false,word:null,mask:''};
  AL={stones:[],turn:1,winner:0,phase:'idle',auth:'[]',mine:false}; stopAsim();
  initBeat(); stopBeat(); initTet(); stopTet();
  setMode(selMode);                              // provisional; the server state message corrects it
  $('lobby').classList.add('hidden'); $('game').classList.remove('hidden');
  $('roomcode').textContent=code; ui(); connect(); draw(); if(MODE==='draw') clearDrawCanvas(); }
function leave(){ inGame=false; clearReconn(); stopPing();
  if(ws){ try{ ws.onclose=null; ws.close(); }catch(e){} } ws=null; room=null;
  history.replaceState(null,'',location.pathname);
  $('game').classList.add('hidden'); $('lobby').classList.remove('hidden'); }
$('btnLeave').onclick=leave;
$('btnCopy').onclick=async()=>{ try{ await navigator.clipboard.writeText(location.origin+location.pathname+'#'+room);
  $('btnCopy').textContent='✓ 복사됨'; setTimeout(()=>$('btnCopy').textContent='🔗 초대링크 복사',1200);}catch(e){} };

/* ---- websocket ---- */
function clearReconn(){ if(reconnT){ clearTimeout(reconnT); reconnT=null; } }
function stopPing(){ if(pingT){ clearInterval(pingT); pingT=null; } }
function connect(){
  clearReconn();
  if(ws){ try{ ws.onclose=null; ws.onmessage=null; ws.close(); }catch(e){} }   // never leave an orphan socket behind
  const proto=location.protocol==='https:'?'wss':'ws';
  const sock=new WebSocket(proto+'://'+location.host+'/ws/'+room); ws=sock;
  sock.onopen=()=>{ if(sock!==ws) return; retry=0;
    sock.send(JSON.stringify({t:'join',name:$('nick').value.trim().slice(0,12),token:TOKEN,mode:selMode}));
    stopPing(); pingT=setInterval(()=>{ if(sock===ws&&sock.readyState===1) sock.send('ping'); },30000); };  // keepalive (answered by the DO runtime)
  sock.onmessage=e=>{ if(sock!==ws) return; let m; try{m=JSON.parse(e.data);}catch(err){return;}
    if(m&&typeof m==='object') handle(m); };
  sock.onclose=()=>{ if(sock!==ws) return; stopPing();
    if(!inGame) return;
    if(++retry>8){ log('sys','접속 실패 — 방이 가득 찼거나 서버 문제예요. 나갔다가 다시 들어와 보세요.'); return; }
    log('sys','연결 끊김 — 재접속 중…');
    reconnT=setTimeout(()=>{ reconnT=null; if(inGame) connect(); }, Math.min(15000,1300*retry)); };
}
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }

function handle(m){
  /* ---- draw mode ---- */
  if(m.t==='state'&&m.mode==='draw'){ setMode('draw');
    DRAW={phase:m.phase,roundEnd:m.roundEnd,youDrawer:m.youDrawer,word:m.word,mask:m.mask};
    renderScores(m.players); clearDrawCanvas(); (m.strokes||[]).forEach(paintStroke);
    drawUiSync(); log('sys', m.phase==='drawing'?'라운드 진행 중!':'🎨 그림 맞추기 — 단어를 그림으로!'); return; }
  if(m.t==='round'){ DRAW={phase:'drawing',roundEnd:m.roundEnd,youDrawer:m.you,word:m.word,mask:m.mask};
    clearDrawCanvas(); renderScores(m.players); drawUiSync();
    log('sys',`라운드 ${m.roundN} — ${m.drawer}님이 그립니다${m.you?' (당신!)':''}`); return; }
  if(m.t==='stroke'){ paintStroke(m); return; }
  if(m.t==='clear'){ clearDrawCanvas(); return; }
  if(m.t==='correct'){ renderScores(m.players); log('sys',`🎉 ${m.name} 정답!`); return; }
  if(m.t==='reveal'){ DRAW.phase='reveal'; DRAW.word=m.word; DRAW.roundEnd=Date.now()+6000;
    renderScores(m.players); drawUiSync();
    log('sys',`⏰ 정답은 「${m.word}」${m.reason==='all'?' — 전원 정답!':m.reason==='drawer-left'?' (출제자 퇴장)':''}`); return; }
  if(m.t==='phase'){ DRAW.phase=m.phase; if(m.players)renderScores(m.players); drawUiSync(); return; }
  if(m.t==='players'){ if(MODE==='beat'&&BEAT){ BEAT.players=m.players||[]; renderBeatBoard(); }
    else if(MODE==='tet'&&TET){ TET.players=m.players||[]; renderTetScores(); }
    else renderScores(m.players); return; }
  /* ---- alka ---- */
  if(m.t==='state'&&m.mode==='alka'){ setMode('alka'); stopAsim(); selStone=-1; aim=null;
    seats=m.seats; myRole=m.role; SOLO=!!m.solo;
    AL={stones:m.stones.map(s=>({x:s.x,y:s.y,o:s.o,a:s.a,vx:0,vy:0})), turn:m.turn, winner:m.winner,
        phase:m.phase||'idle', auth:JSON.stringify(m.stones), mine:false,
        wobble:m.wobble|0, locked:!!m.started&&!m.winner};
    syncWobUi();
    aui(); arender();
    log('sys', myRole? `당신은 ${myRole===1?'흑(아래)':'백(위)'} — 라운드 ${m.round}. 내 돌을 당겨서 튕기세요!` : '관전 모드'); return; }
  if(m.t==='flick'){ if(MODE!=='alka')return; const s=AL.stones[m.i]; if(!s||!s.a)return;
    s.vx=m.vx; s.vy=m.vy; AL.phase='sim'; AL.mine=false; startAsim(); aui(); return; }
  if(m.t==='settle'){ if(MODE!=='alka')return; stopAsim(); selStone=-1; aim=null;
    m.stones.forEach((s,k)=>{ const t=AL.stones[k]; if(t.a&&!s.a) addFader(t); });   // authoritative knock-outs cry too
    m.stones.forEach((s,k)=>{ const t=AL.stones[k]; t.x=s.x; t.y=s.y; t.a=s.a; t.vx=0; t.vy=0; });
    AL.turn=m.turn; AL.winner=m.winner; AL.phase='idle'; AL.mine=false; AL.auth=JSON.stringify(m.stones);
    AL.locked=!m.winner; syncWobUi();            // unlock when the game ends
    aui(); arender();
    if(m.winner) log('sys',(m.winner===1?'흑':'백')+' 승리! 🏆'); return; }
  if(m.t==='wobble'){ if(MODE!=='alka')return; AL.wobble=m.v|0; syncWobUi(); return; }
  if(m.t==='abort'){ if(MODE!=='alka')return; stopAsim(); selStone=-1; aim=null;
    JSON.parse(AL.auth).forEach((s,k)=>{ const t=AL.stones[k]; if(t){ t.x=s.x; t.y=s.y; t.a=s.a; t.vx=0; t.vy=0; } });
    AL.phase='idle'; AL.mine=false; aui(); arender(); return; }
  /* ---- beat ---- */
  if(m.t==='state'&&m.mode==='beat'){ setMode('beat'); initBeat();
    BEAT.players=m.players||[];
    if(m.phase==='playing'){ const off=m.now-Date.now();

function boardEmpty(){ return board.every(v=>!v); }
function myTurnNow(){                       // may I place a stone right now?
  if(!(seats&&seats[1]&&seats[2])||winner) return false;
  if(SOLO) return myRole!==0;
  if(myRole!==turn) return false;
  const s=seats[turn]; if(!s||!s.mate) return true;
  const up=s.up||0;
  const upOnline = up===1 ? s.mate.online : s.online;
  if(!upOnline) return true;                // cover an offline teammate
  return YOUIDX===up;
}

/* ---- board ---- */
const cv=$('board'), cx=cv.getContext('2d');
const DPR=Math.min(2,window.devicePixelRatio||1), CSS=600, PAD=34;
cv.width=CSS*DPR; cv.height=CSS*DPR; cv.style.width='min(600px,92vw)';
const step=(CSS-PAD*2)/(SIZE-1);
const px=i=>PAD+(i%SIZE)*step, py=i=>PAD+((i/SIZE)|0)*step;
let hover=-1;

function draw(){
  if(MODE!=='omok') return;
  cx.setTransform(DPR,0,0,DPR,0,0);
  const g=cx.createLinearGradient(0,0,CSS,CSS); g.addColorStop(0,'#e2b87e'); g.addColorStop(1,'#c89554');
  cx.fillStyle=g; cx.fillRect(0,0,CSS,CSS);
  cx.strokeStyle='rgba(80,50,20,.55)'; cx.lineWidth=1;
  for(let k=0;k<SIZE;k++){
    cx.beginPath(); cx.moveTo(PAD,PAD+k*step); cx.lineTo(CSS-PAD,PAD+k*step); cx.stroke();
    cx.beginPath(); cx.moveTo(PAD+k*step,PAD); cx.lineTo(PAD+k*step,CSS-PAD); cx.stroke(); }
  cx.fillStyle='rgba(80,50,20,.75)';
  for(const sx of [3,7,11]) for(const sy of [3,7,11]){
    cx.beginPath(); cx.arc(PAD+sx*step,PAD+sy*step,3,0,7); cx.fill(); }
  // hover ghost (the stone to be placed is always the current turn's color)
  if(hover>=0 && board[hover]===0 && myTurnNow())
    faceStone(px(hover),py(hover),step*.42,turn,EXP.neutral,.45);
  // stones
  for(let i=0;i<CELLS;i++) if(board[i]) faceStone(px(i),py(i),step*.42,board[i],omokExp(i));
  // last move marker
  if(lastMove>=0 && board[lastMove]){ cx.strokeStyle='#ff6f61'; cx.lineWidth=2;
    cx.beginPath(); cx.arc(px(lastMove),py(lastMove),step*.46,0,7); cx.stroke(); }
  // win line: connect the two farthest-apart cells of the winning row
  if(winLine&&winLine.length>1){
    let a=winLine[0], b=winLine[1], best=-1;
    for(const i of winLine) for(const j of winLine){
      const d=(px(i)-px(j))**2+(py(i)-py(j))**2;
      if(d>best){ best=d; a=i; b=j; } }
    cx.strokeStyle='rgba(255,111,97,.9)'; cx.lineWidth=4; cx.lineCap='round';
    cx.beginPath(); cx.moveTo(px(a),py(a)); cx.lineTo(px(b),py(b)); cx.stroke(); }
}
function stone(x,y,v){
  const r=step*.42, gr=cx.createRadialGradient(x-r*.35,y-r*.4,r*.1,x,y,r);
  if(v===1){ gr.addColorStop(0,'#6a6a78'); gr.addColorStop(1,'#0a0a12'); }
  else{ gr.addColorStop(0,'#ffffff'); gr.addColorStop(1,'#c3c7d4'); }
  cx.fillStyle=gr; cx.beginPath(); cx.arc(x,y,r,0,7); cx.fill();
  cx.strokeStyle='rgba(0,0,0,.35)'; cx.lineWidth=.8; cx.stroke();
}
/* ---- tiger character stones (5x6 sprite: rows 0-2 white, 3-5 black; chroma-keyed, head pinned
        at cell center (64,64) with width 104) ---- */
const STONE_IMG=new Image(); STONE_IMG.src='img/stones.png';
STONE_IMG.onload=()=>{ if(MODE==='omok')draw(); else if(MODE==='alka')arender(); };
const EXP={neutral:0,grin:1,wow:2,steam:3,sleep:4,cry:5,grit:6,sad:7,shine:8,calm:9,
           wink:10,dizzy:11,laugh:12,puff:13,love:14};
function faceStone(x,y,r,side,exp,alpha){        // side 1=black tiger, 2=white tiger
  cx.save();
  if(alpha!=null) cx.globalAlpha*=alpha;
  cx.beginPath(); cx.arc(x,y+r*0.18,r*0.92,0,7);  // soft ground shadow
  cx.fillStyle='rgba(50,35,15,.22)'; cx.fill();
  if(STONE_IMG.complete&&STONE_IMG.naturalWidth){
    // preprocessed sheet: transparent bg, 128px cells, head pinned at (64,64) with width 104
    const cw=STONE_IMG.naturalWidth/5, ch2=STONE_IMG.naturalHeight/6;
    const row=(side===2?0:3)+((exp/5)|0), col=exp%5;
    const s=(2*r)/104;                            // dest px per sprite px (head width -> 2r)
    cx.drawImage(STONE_IMG, col*cw, row*ch2, cw, ch2, x-64*s, y-64*s, cw*s, ch2*s);
  } else {                                        // sprite not loaded yet -> plain stone
    const gr=cx.createRadialGradient(x-r*.35,y-r*.4,r*.1,x,y,r);
    if(side===1){ gr.addColorStop(0,'#6a6a78'); gr.addColorStop(1,'#0a0a12'); }
    else{ gr.addColorStop(0,'#ffffff'); gr.addColorStop(1,'#c3c7d4'); }
    cx.fillStyle=gr; cx.beginPath(); cx.arc(x,y,r,0,7); cx.fill();
  }
  cx.restore();
}
function omokExp(i){
  if(winLine&&winLine.indexOf(i)>=0) return EXP.love;   // the winning five celebrate
  if(i===lastMove) return EXP.shine;                    // freshly placed
  const h=(i*2654435761)>>>0;                           // deterministic variety
  return [EXP.neutral,EXP.grin,EXP.calm,EXP.neutral][h%4];
}
function cellAt(e){
  const rect=cv.getBoundingClientRect(), scale=CSS/rect.width;
  const mx=(e.clientX-rect.left)*scale, my=(e.clientY-rect.top)*scale;
  const gx=Math.round((mx-PAD)/step), gy=Math.round((my-PAD)/step);
  if(gx<0||gx>=SIZE||gy<0||gy>=SIZE) return -1;
  if(Math.abs(mx-(PAD+gx*step))>step*.45||Math.abs(my-(PAD+gy*step))>step*.45) return -1;
  return gy*SIZE+gx;
}

function noise(){ if(noiseBuf)return noiseBuf; const b=actx.createBuffer(1,actx.sampleRate*0.1,actx.sampleRate);
  const d=b.getChannelData(0); for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1; noiseBuf=b; return b; }
function kick(w){ const o=actx.createOscillator(),g=actx.createGain();
  o.frequency.setValueAtTime(150,w); o.frequency.exponentialRampToValueAtTime(45,w+0.1);
  g.gain.setValueAtTime(0.5,w); g.gain.exponentialRampToValueAtTime(0.001,w+0.13);
  o.connect(g).connect(actx.destination); o.start(w); o.stop(w+0.14); }
function hat(w){ const s=actx.createBufferSource(),g=actx.createGain(),f=actx.createBiquadFilter();
  s.buffer=noise(); f.type='highpass'; f.frequency.value=6000;
  g.gain.setValueAtTime(0.09,w); g.gain.exponentialRampToValueAtTime(0.001,w+0.04);
  s.connect(f).connect(g).connect(actx.destination); s.start(w); s.stop(w+0.05); }
function snare(w){ const s=actx.createBufferSource(),g=actx.createGain(),f=actx.createBiquadFilter();
  s.buffer=noise(); f.type='bandpass'; f.frequency.value=1800;
  g.gain.setValueAtTime(0.22,w); g.gain.exponentialRampToValueAtTime(0.001,w+0.11);
  s.connect(f).connect(g).connect(actx.destination); s.start(w); s.stop(w+0.12); }
function blip(pts){ try{ if(!actx||actx.state!=='running')return;
  const o=actx.createOscillator(),g=actx.createGain(),w=actx.currentTime;
  o.type='square'; o.frequency.value=pts>=300?990:pts>=150?770:550;
  g.gain.setValueAtTime(0.06,w); g.gain.exponentialRampToValueAtTime(0.001,w+0.05);
  o.connect(g).connect(actx.destination); o.start(w); o.stop(w+0.06); }catch(e){} }
function scheduleAudio(st){ const B=BEAT; try{
  if(!actx||actx.state!=='running')return;
  const half=30000/B.chart.bpm;                    // 8th-note grid in ms
  while(B.audioBeat*half<st+320){ const evT=B.audioBeat*half;
    if(evT>=B.chart.duration){ B.audioBeat++; break; }
    if(evT>=0&&evT>=st-40){ const w=actx.currentTime+Math.max(0,(evT-st)/1000), e=B.audioBeat;
      hat(w); if(e%2===0){ kick(w); const bi=(e/2)%4; if(bi===1||bi===3) snare(w); } }
    B.audioBeat++; } }catch(e){} }
initBeat();

/* ---- tet mode (테트리스): same seeded 7-bag, local play, garbage attacks ---- */
const TSHP={I:[[0,1],[1,1],[2,1],[3,1]],J:[[0,0],[0,1],[1,1],[2,1]],L:[[2,0],[0,1],[1,1],[2,1]],
  O:[[1,0],[2,0],[1,1],[2,1]],S:[[1,0],[2,0],[0,1],[1,1]],T:[[1,0],[0,1],[1,1],[2,1]],Z:[[0,0],[1,0],[1,1],[2,1]]};
const TCOLS={I:'#35dcff',J:'#4a7dff',L:'#ffb454',O:'#ffe14d',S:'#3ee08a',T:'#b58cff',Z:'#ff6f61',G:'#9aa3b5'};
const TFX=165,TFY=28,TCS=27;                     // field origin + cell size on the 600 canvas
function initTet(){ if(TET&&TET.loop) clearInterval(TET.loop);
  TET={phase:'lobby',players:[],live:{},rnd:null,queue:[],board:null,cur:null,
       score:0,lines:0,over:false,pend:0,acc:0,lastT:0,perfStart:0,roundN:0,loop:null,
       lastSend:0,lastBoard:0,dirty:false}; }
function stopTet(){ if(TET&&TET.loop){ clearInterval(TET.loop); TET.loop=null; } }
function tetLobbyUi(){ if(MODE!=='tet')return;
  $('wordtxt').textContent='🧱 준비되면 시작! (혼자 연습도 가능)'; $('timer').textContent='';
  $('btnBegin').classList.remove('hidden'); $('tpad').classList.add('hidden');
  $('turnmsg').textContent=''; trenderIdle(); }
function tCells(p,r){ let c=TSHP[p].map(v=>v.slice()); if(p==='O')return c;
  const n=p==='I'?4:3;
  for(let k=0;k<(r%4+4)%4;k++) c=c.map(([x,y])=>[n-1-y,x]);
  return c; }
function tHit(p,r,x,y){ for(const [cx2,cy2] of tCells(p,r)){
    const bx=x+cx2, by=y+cy2;
    if(bx<0||bx>=10||by>=20) return true;
    if(by>=0&&TET.board[by][bx]) return true; }
  return false; }
function refillTetBag(){ const bag=['I','J','L','O','S','T','Z'];
  for(let i=6;i>0;i--){ const j=(TET.rnd()*(i+1))|0; const t=bag[i]; bag[i]=bag[j]; bag[j]=t; }
  TET.queue.push(...bag); }
function spawnTet(){ if(TET.queue.length<7) refillTetBag();
  const p=TET.queue.shift();
  TET.cur={p,r:0,x:3,y:p==='I'?-1:(p==='O'?0:-1)};
  if(tHit(TET.cur.p,TET.cur.r,TET.cur.x,TET.cur.y)) tetTopOut(); }
function tetLevel(){ return 1+((TET.lines/10)|0); }
function tetGrav(){ return Math.max(90,700-(tetLevel()-1)*60); }
function tetMove(dx){ const c=TET.cur; if(c&&!tHit(c.p,c.r,c.x+dx,c.y)){ c.x+=dx; trender(); } }
function tetRot(dir){ const c=TET.cur; if(!c)return; const nr=(c.r+dir+4)%4;
  for(const k of [0,-1,1,-2,2]) if(!tHit(c.p,nr,c.x+k,c.y)){ c.r=nr; c.x+=k; trender(); return; } }
function tetSoft(){ const c=TET.cur; if(!c)return;
  if(!tHit(c.p,c.r,c.x,c.y+1)){ c.y++; TET.score++; TET.dirty=true; trender(); } else tetLock(); }
function tetHard(){ const c=TET.cur; if(!c)return; let d2=0;
  while(!tHit(c.p,c.r,c.x,c.y+1)){ c.y++; d2++; }
  TET.score+=d2*2; TET.dirty=true; tetLock(); }
function tetLock(){ const c=TET.cur; let died=false;
  for(const [cx2,cy2] of tCells(c.p,c.r)){ const by=c.y+cy2;
    if(by<0){ died=true; continue; } TET.board[by][c.x+cx2]=c.p; }
  // clear lines
  let cleared=0;
  for(let y=19;y>=0;y--){ if(TET.board[y].every(v=>v)){ TET.board.splice(y,1);
    TET.board.unshift(Array(10).fill(0)); cleared++; y++; } }
  TET.dirty=true;                                // board changed -> opponents' mini view needs it
  if(cleared){ TET.score+=[0,100,300,500,800][cleared]*tetLevel(); TET.lines+=cleared;
    const out=[0,0,1,2,4][cleared]; if(out) send({t:'tgarb',n:out}); }
  // apply pending garbage (gray rows with one hole)
  if(TET.pend>0){ for(let k=0;k<TET.pend;k++){ TET.board.shift();
      const row2=Array(10).fill('G'); row2[(Math.random()*10)|0]=0; TET.board.push(row2); }
    TET.pend=0; }
  if(died){ tetTopOut(); return; }
  spawnTet(); trender(); }
function tetTopOut(){ if(TET.over)return; TET.over=true; TET.cur=null;
  send({t:'tfin',s:TET.score,l:TET.lines});
  $('wordtxt').textContent='💀 탈락! — '+TET.score+'점 · '+TET.lines+'줄 · 다른 플레이어 대기 중';
  $('tpad').classList.add('hidden'); trender(); }
function songTet(){ return performance.now()-TET.perfStart; }
function packTetBoard(){ let s='';                // 20 rows -> 3 hex digits each (10 bits)
  for(let y=0;y<20;y++){ let v=0; for(let x=0;x<10;x++) if(TET.board[y][x]) v|=1<<x;
    s+=v.toString(16).padStart(3,'0'); }
  return s; }
function startTetLoop(){ stopTet(); TET.acc=0; TET.lastT=performance.now(); TET.loop=setInterval(tetTick,30); }
function tetTick(){ const T=TET; if(!T||T.phase!=='playing'){ stopTet(); return; }
  const st=songTet(), now=performance.now(), dt=Math.min(500,now-T.lastT); T.lastT=now;
  if(st<0){ trender(); $('wordtxt').textContent='시작까지 '+Math.ceil(-st/1000)+'…'; return; }
  if(!T.over&&T.cur){ T.acc+=dt;
    const g2=tetGrav();
    while(T.acc>=g2){ T.acc-=g2;
      if(!tHit(T.cur.p,T.cur.r,T.cur.x,T.cur.y+1)) T.cur.y++;
      else { tetLock(); break; } } }
  trender();
  if(!T.over){ $('wordtxt').textContent='🧱 '+T.score+'점 · '+T.lines+'줄 · Lv'+tetLevel();
    const s2=(st/1000)|0; $('timer').textContent=((s2/60)|0)+':'+String(s2%60).padStart(2,'0'); }
  const pn=performance.now();
  if(pn-T.lastSend>600&&T.dirty){ T.dirty=false; T.lastSend=pn;
    send({t:'tscore',s:T.score,l:T.lines,b:packTetBoard()}); }
  if(pn-T.lastBoard>500){ T.lastBoard=pn; renderTetScores(); } }
function trenderIdle(){ cx.setTransform(DPR,0,0,DPR,0,0);
  cx.fillStyle='#0c1120'; cx.fillRect(0,0,CSS,CSS);
  cx.fillStyle='rgba(159,178,207,.85)'; cx.font='700 21px Pretendard,sans-serif'; cx.textAlign='center';
  cx.fillText('🧱 게임 시작을 누르면 모두 같은 블록이 내려옵니다',300,280);
  cx.fillText('줄을 지우면 상대에게 가비지 공격! 💣',300,315); }
function trender(){ const T=TET; if(MODE!=='tet'||!T||!T.board)return;
  cx.setTransform(DPR,0,0,DPR,0,0);
  cx.fillStyle='#0c1120'; cx.fillRect(0,0,CSS,CSS);
  cx.fillStyle='#080d18'; cx.fillRect(TFX,TFY,10*TCS,20*TCS);
  cx.strokeStyle='rgba(140,170,220,.1)'; cx.lineWidth=1;
  for(let x=0;x<=10;x++){ cx.beginPath(); cx.moveTo(TFX+x*TCS,TFY); cx.lineTo(TFX+x*TCS,TFY+20*TCS); cx.stroke(); }
  for(let y=0;y<=20;y++){ cx.beginPath(); cx.moveTo(TFX,TFY+y*TCS); cx.lineTo(TFX+10*TCS,TFY+y*TCS); cx.stroke(); }
  const cell=(x,y,col,ghost)=>{ if(y<0)return;
    if(ghost){ cx.strokeStyle=col; cx.lineWidth=2; cx.strokeRect(TFX+x*TCS+3,TFY+y*TCS+3,TCS-6,TCS-6); return; }
    cx.fillStyle=col; cx.fillRect(TFX+x*TCS+1,TFY+y*TCS+1,TCS-2,TCS-2);
    cx.fillStyle='rgba(255,255,255,.18)'; cx.fillRect(TFX+x*TCS+1,TFY+y*TCS+1,TCS-2,5); };
  for(let y=0;y<20;y++) for(let x=0;x<10;x++) if(T.board[y][x]) cell(x,y,TCOLS[T.board[y][x]]);
  if(T.cur&&!T.over){ const c=T.cur; let gy=c.y;
    while(!tHit(c.p,c.r,c.x,gy+1)) gy++;
    for(const [dx2,dy2] of tCells(c.p,c.r)) cell(c.x+dx2,gy+dy2,'rgba(255,255,255,.28)',true);
    for(const [dx2,dy2] of tCells(c.p,c.r)) cell(c.x+dx2,c.y+dy2,TCOLS[c.p]); }
  // next 3
  cx.fillStyle='rgba(159,178,207,.7)'; cx.font='700 13px Pretendard,sans-serif'; cx.textAlign='left';
  cx.fillText('NEXT',462,46);
  T.queue.slice(0,3).forEach((p,i)=>{ for(const [dx2,dy2] of TSHP[p]){
    cx.fillStyle=TCOLS[p]; cx.fillRect(460+dx2*15,58+i*66+dy2*15,13,13); } });
  // left HUD
  cx.textAlign='right'; cx.fillStyle='#eef3fb'; cx.font='800 20px Pretendard,sans-serif';
  cx.fillText(String(T.score),150,60);
  cx.fillStyle='rgba(159,178,207,.8)'; cx.font='700 13px Pretendard,sans-serif';
  cx.fillText(T.lines+'줄 · Lv'+tetLevel(),150,82);
  if(T.pend>0){ cx.fillStyle='#ff6f61'; cx.font='800 17px Pretendard,sans-serif';
    cx.fillText('⚠ 가비지 +'+T.pend,150,116); }
  // opponents' live mini boards (right column, up to 4)
  const me2=$('nick').value.trim().slice(0,12);
  const opps=(T.players||[]).filter(p=>p.name!==me2&&p.playing!==false)
    .map(p=>({name:p.name, s:(T.live[p.name]?T.live[p.name].s:p.score)|0,
              b:T.live[p.name]&&T.live[p.name].b, fin:!!p.finished}))
    .sort((a,b2)=>b2.s-a.s).slice(0,4);
  opps.forEach((o,i)=>{ const bx=455+(i%2)*72, by=268+((i/2)|0)*146;
    cx.fillStyle='#080d18'; cx.fillRect(bx,by,50,100);
    cx.strokeStyle=o.fin?'rgba(255,111,97,.7)':'rgba(140,170,220,.28)'; cx.lineWidth=1;
    cx.strokeRect(bx,by,50,100);
    if(o.b&&o.b.length>=60){ cx.fillStyle='#6e8fc0';
      for(let y2=0;y2<20;y2++){ const v=parseInt(o.b.slice(y2*3,y2*3+3),16);
        for(let x2=0;x2<10;x2++) if(v&(1<<x2)) cx.fillRect(bx+x2*5,by+y2*5,4,4); } }
    if(o.fin){ cx.fillStyle='rgba(5,8,16,.55)'; cx.fillRect(bx,by,50,100);
      cx.font='18px sans-serif'; cx.textAlign='center'; cx.fillText('💀',bx+25,by+58); }
    cx.fillStyle='rgba(159,178,207,.9)'; cx.font='700 10px Pretendard,sans-serif'; cx.textAlign='center';
    cx.fillText(o.name.slice(0,6),bx+25,by+113);
    cx.fillText(String(o.s),bx+25,by+126); });
  const st=songTet();
  if(st<0){ cx.fillStyle='#fff'; cx.font='800 72px Pretendard,sans-serif'; cx.textAlign='center';
    cx.fillText(String(Math.ceil(-st/1000)),300,300); }
  if(T.over){ cx.fillStyle='rgba(5,8,16,.55)'; cx.fillRect(TFX,TFY,10*TCS,20*TCS);
    cx.fillStyle='#ff6f61'; cx.font='800 40px Pretendard,sans-serif'; cx.textAlign='center';
    cx.fillText('💀 탈락',300,300); } }
function renderTetScores(){ if(MODE!=='tet'||!TET)return; const el=$('scores'); el.innerHTML='';
  const me=$('nick').value.trim().slice(0,12);
  const rows=(TET.players||[]).map(p=>({name:p.name, s:(TET.live[p.name]?TET.live[p.name].s:p.score)|0,
    l:TET.live[p.name]?TET.live[p.name].l:(p.lines|0), online:p.online!==false}));
  const mine=rows.find(r2=>r2.name===me);
  if(mine&&TET.phase==='playing'){ mine.s=TET.score; mine.l=TET.lines; }
  rows.sort((a,b)=>b.s-a.s).forEach(r2=>{
    const d2=document.createElement('div'); d2.className='sc'+(r2.online?'':' off')+(r2.name===me?' drawer':'');
    const nm=document.createElement('span'); nm.textContent=(r2.name===me?'🎧 ':'')+r2.name;
    const pt=document.createElement('span'); pt.className='pt'; pt.textContent=r2.s+' · '+r2.l+'줄';
    d2.appendChild(nm); d2.appendChild(pt); el.appendChild(d2); }); }
document.addEventListener('keydown',e=>{ if(MODE!=='tet'||!TET||TET.phase!=='playing'||TET.over||!TET.cur)return;
  if(songTet()<0)return;
  const ae=document.activeElement;
  if(ae&&(ae.tagName==='INPUT'||ae.tagName==='TEXTAREA'))return;   // typing in chat, not playing
  const k=e.code;
  if(k==='ArrowLeft'||k==='KeyA'){ e.preventDefault(); tetMove(-1); }
  else if(k==='ArrowRight'||k==='KeyD'){ e.preventDefault(); tetMove(1); }
  else if(k==='ArrowDown'||k==='KeyS'){ e.preventDefault(); tetSoft(); }
  else if(k==='ArrowUp'||k==='KeyW'||k==='KeyX'){ e.preventDefault(); tetRot(1); }
  else if(k==='KeyZ'){ e.preventDefault(); tetRot(-1); }
  else if(k==='Space'||k==='Enter'||k==='NumpadEnter'){ e.preventDefault(); tetHard(); } });
/* mobile SOTA gestures: drag = move / slow drag down = soft / fast flick down = hard / tap = rotate */
let tetG=null;
cv.addEventListener('pointerdown',e=>{ if(MODE!=='tet'||!TET||TET.phase!=='playing'||TET.over||!TET.cur||songTet()<0)return;
  const [x,y]=evPt(e); tetG={x0:x,y0:y,t0:performance.now(),lx:x,ly:y,acted:false};
  try{cv.setPointerCapture(e.pointerId);}catch(err){} e.preventDefault(); });
cv.addEventListener('pointermove',e=>{ if(MODE!=='tet'||!tetG||!TET.cur)return;
  const [x,y]=evPt(e);
  while(x-tetG.lx>26){ tetMove(1); tetG.lx+=26; tetG.acted=true; }
  while(tetG.lx-x>26){ tetMove(-1); tetG.lx-=26; tetG.acted=true; }
  while(y-tetG.ly>32){ tetSoft(); tetG.ly+=32; tetG.acted=true; }
  if(y<tetG.ly) tetG.ly=y; });
cv.addEventListener('pointerup',e=>{ if(MODE!=='tet'||!tetG)return;
  const g2=tetG; tetG=null; if(!TET.cur)return;
  const [x,y]=evPt(e), dt2=performance.now()-g2.t0, dy=y-g2.y0, dx=Math.abs(x-g2.x0);
  if(dy>90&&dy>dx*1.5&&dy/dt2>0.6){ tetHard(); return; }          // fast downward flick
  if(!g2.acted&&dt2<300&&dx<12&&Math.abs(dy)<12){                  // tap: left third CCW, else CW
    if(x<200) tetRot(-1); else tetRot(1); } });
cv.addEventListener('pointercancel',()=>{ if(MODE==='tet') tetG=null; });
(function buildTpad(){ const t=$('tpad');
  const mk2=(txt,fn)=>{ const b=document.createElement('button'); b.type='button'; b.className='btn';
    b.style.cssText='padding:9px 0;font-size:16px;flex:1';
    b.textContent=txt;
    b.addEventListener('pointerdown',e=>{ e.preventDefault(); if(MODE==='tet'&&TET&&TET.phase==='playing'&&!TET.over&&TET.cur&&songTet()>=0) fn(); });
    t.appendChild(b); };
  mk2('◀',()=>tetMove(-1)); mk2('▼',()=>tetSoft()); mk2('▶',()=>tetMove(1));
  mk2('⟲',()=>tetRot(-1)); mk2('⟳',()=>tetRot(1)); mk2('⏬',()=>tetHard()); })();
initTet();

/* browser back/forward: leaving the room hash exits to the lobby; a room hash (re)enters */
window.addEventListener('hashchange',()=>{
  const h=location.hash.replace('#','').toUpperCase();
  const valid=/^[A-Z0-9]{4,8}$/.test(h)&&$('nick').value.trim();
  if(inGame){ if(h!==room){ leave(); if(valid) enter(h); } }
  else if(valid) enter(h);
});

/* auto-join via #CODE (last: everything above must be initialized) */
(function(){ const h=location.hash.replace('#','').toUpperCase();
  if(/^[A-Z0-9]{4,8}$/.test(h)){ if($('nick').value.trim()) enter(h); else $('code').value=h; } })();
