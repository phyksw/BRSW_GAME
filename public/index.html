<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>🎮 멀티게임 라운지</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pretendard@1.3.9/dist/web/variable/pretendardvariable.min.css">
<style>
:root{--bg:#0b1020;--card:#141b30;--card2:#1a2340;--line:rgba(140,170,220,.16);--text:#eef3fb;
  --soft:#9fb2cf;--mute:#66799c;--cyan:#35dcff;--coral:#ff6f61;--ok:#3ee08a;
  --wood1:#e0b477;--wood2:#c08c4a;--sans:'Pretendard Variable',Pretendard,system-ui,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{background:radial-gradient(1000px 700px at 70% -10%,#141f3d 0%,var(--bg) 60%);color:var(--text);
  font-family:var(--sans);min-height:100vh}
.wrap{max-width:1060px;margin:0 auto;padding:20px 16px}
header{display:flex;align-items:center;gap:10px;margin-bottom:18px}
header h1{font-size:20px;font-weight:800}
header .tag{font-size:10px;letter-spacing:.12em;color:var(--cyan);border:1px solid rgba(53,220,255,.35);
  padding:3px 9px;border-radius:999px;text-transform:uppercase}
.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px}
.hidden{display:none!important}
/* ---- lobby ---- */
#lobby{max-width:460px;margin:6vh auto 0}
#lobby h2{font-size:16px;font-weight:800;margin-bottom:14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11.5px;color:var(--soft);margin-bottom:6px}
input[type=text]{width:100%;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  color:var(--text);font-family:var(--sans);font-size:14px;padding:11px 13px;outline:none}
input[type=text]:focus{border-color:rgba(53,220,255,.5)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;border:none;
  font-family:var(--sans);font-weight:700;font-size:13.5px;border-radius:12px;padding:11px 16px;
  background:var(--card2);color:var(--text);border:1px solid var(--line);transition:filter .12s}
.btn:hover{filter:brightness(1.15)}
.btn.primary{background:linear-gradient(135deg,#20c9e8,#1897d8);border:none;color:#04222e}
.btn.coral{background:linear-gradient(135deg,#ff8a76,#f4604f);border:none;color:#3d0f08}
.btn:disabled{opacity:.45;cursor:not-allowed;filter:none}
.row{display:flex;gap:9px}.row>*{flex:1}
.games{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:14px 0 18px}
.gitem{display:flex;align-items:center;gap:9px;background:var(--card2);border:1px solid var(--line);
  border-radius:12px;padding:10px 12px;font-size:13px;font-weight:700}
.gitem .soon{margin-left:auto;font-size:9.5px;color:var(--mute);border:1px solid var(--line);
  padding:2px 7px;border-radius:999px}
.gitem.on{border-color:rgba(62,224,138,.45)}
.gitem.on .soon{color:var(--ok);border-color:rgba(62,224,138,.45)}
button.gitem{font-family:var(--sans);color:var(--text);text-align:left;cursor:pointer}
.gitem.sel{outline:2.5px solid var(--cyan);outline-offset:1px}
/* ---- draw mode ---- */
.wordbar{display:flex;align-items:center;gap:10px;width:100%;background:var(--card2);border:1px solid var(--line);
  border-radius:12px;padding:9px 14px;font-weight:800;font-size:15px;letter-spacing:.14em}
.wordbar #timer{margin-left:auto;letter-spacing:0;color:var(--coral);font-size:13.5px;white-space:nowrap}
.tools{display:flex;align-items:center;gap:8px;width:100%;flex-wrap:wrap}
.tools .sw{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.25);cursor:pointer;padding:0}
.tools .sw.on{outline:2.5px solid var(--cyan);outline-offset:1.5px}
.tools .wd{width:36px;height:27px;border-radius:8px;background:var(--card2);border:1px solid var(--line);
  cursor:pointer;color:var(--soft);display:flex;align-items:center;justify-content:center;padding:0}
.tools .wd.on{border-color:var(--cyan);color:var(--text)}
.scores{display:flex;flex-direction:column;gap:6px}
.scores .sc{display:flex;gap:8px;align-items:center;background:var(--card2);border:1px solid var(--line);
  border-radius:10px;padding:7px 11px;font-size:12.5px;font-weight:700}
.scores .sc .pt{margin-left:auto;color:var(--cyan)}
.scores .sc.off{opacity:.45}
.scores .sc.drawer{border-color:rgba(53,220,255,.5)}
/* ---- game ---- */
#game{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:16px}
@media(max-width:820px){#game{grid-template-columns:1fr}}
.boardcard{display:flex;flex-direction:column;align-items:center;gap:12px}
#board{border-radius:14px;box-shadow:0 16px 40px -18px rgba(0,0,0,.7);cursor:pointer;touch-action:manipulation;
  max-width:100%;height:auto}
.topbar{display:flex;align-items:center;gap:10px;width:100%;flex-wrap:wrap}
.codechip{display:flex;align-items:center;gap:8px;background:var(--card2);border:1px solid var(--line);
  border-radius:999px;padding:7px 14px;font-size:13px;font-weight:800;letter-spacing:.14em}
.codechip small{letter-spacing:0;font-weight:600;color:var(--mute)}
#turnmsg{margin-left:auto;font-size:13px;font-weight:700;color:var(--soft)}
#turnmsg.me{color:var(--ok)}
#turnmsg.win{color:var(--coral)}
.side{display:flex;flex-direction:column;gap:12px;min-height:0}
.pl{display:flex;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line);
  border-radius:12px;padding:9px 12px;font-size:13px;font-weight:700}
.pl .stone{width:18px;height:18px;border-radius:50%;flex:none;border:1px solid rgba(255,255,255,.25)}
.pl .stone.b{background:radial-gradient(circle at 34% 30%,#5a5a66,#0a0a10)}
.pl .stone.w{background:radial-gradient(circle at 34% 30%,#ffffff,#c9ccd6)}
.pl .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pl .st{margin-left:auto;font-size:10.5px;color:var(--mute)}
.pl.turn{border-color:rgba(62,224,138,.55)}
.pl.me .nm::after{content:" (나)";color:var(--cyan);font-size:11px}
#watch{font-size:11px;color:var(--mute);text-align:right}
#log{flex:1;background:var(--card2);border:1px solid var(--line);border-radius:12px;
  padding:10px 12px;overflow-y:auto;font-size:12.5px;line-height:1.55;min-height:180px;max-height:320px}
#log .sys{color:var(--mute);font-size:11.5px}
#log .nm{font-weight:800;color:var(--cyan)}
.chatrow{display:flex;gap:7px}
.chatrow input{flex:1}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>🎮 멀티게임 라운지</h1><span class="tag">phyksw · rooms</span></header>

  <!-- lobby -->
  <div id="lobby" class="card">
    <h2>친구랑 같이 하는 미니게임</h2>
    <div class="games" id="gamesList">
      <button type="button" class="gitem on sel" data-mode="omok">⚫ 오목 <span class="soon">PLAY</span></button>
      <button type="button" class="gitem on" data-mode="draw">🎨 그림그리기 <span class="soon">PLAY</span></button>
      <button type="button" class="gitem on" data-mode="alka">🥌 알까기 <span class="soon">PLAY</span></button>
      <div class="gitem">🎵 리듬 <span class="soon">준비중</span></div>
      <div class="gitem">🗺️ 땅따먹기 <span class="soon">준비중</span></div>
    </div>
    <div class="field"><label>닉네임</label><input type="text" id="nick" maxlength="12" placeholder="예: 김선장"></div>
    <div class="field"><label>방 코드 (입장할 때만)</label><input type="text" id="code" maxlength="8" placeholder="예: A3K9F" style="text-transform:uppercase"></div>
    <div class="row">
      <button class="btn primary" id="btnNew">+ 새 방 만들기</button>
      <button class="btn" id="btnJoin">방 입장</button>
    </div>
  </div>

  <!-- game -->
  <div id="game" class="hidden">
    <div class="card boardcard">
      <div class="topbar">
        <span class="codechip"><small>ROOM</small> <span id="roomcode"></span></span>
        <button class="btn" id="btnCopy" style="padding:7px 12px;font-size:12px">🔗 초대링크 복사</button>
        <span id="turnmsg"></span>
      </div>
      <div class="wordbar hidden" id="wordbar"><span id="wordtxt"></span><span id="timer"></span></div>
      <canvas id="board" width="600" height="600"></canvas>
      <div class="tools hidden" id="tools"></div>
      <div class="row" style="width:100%">
        <button class="btn primary hidden" id="btnBegin">🎨 라운드 시작</button>
        <button class="btn coral hidden" id="btnRestart">↻ 새 판 (흑백 교대)</button>
        <button class="btn" id="btnLeave" style="flex:0 0 auto">나가기</button>
      </div>
    </div>
    <div class="card side">
      <div class="pl" id="pl1"><span class="stone b"></span><span class="nm">—</span><span class="st"></span></div>
      <div class="pl" id="pl2"><span class="stone w"></span><span class="nm">—</span><span class="st"></span></div>
      <div class="scores hidden" id="scores"></div>
      <div id="watch"></div>
      <div id="log"></div>
      <div class="chatrow"><input type="text" id="chat" maxlength="200" placeholder="채팅…"><button class="btn" id="btnSend" style="flex:0 0 auto">전송</button></div>
    </div>
  </div>
</div>

<script>
'use strict';
const $=id=>document.getElementById(id);
const SIZE=15, CELLS=SIZE*SIZE;

/* ---- identity ---- */
$('nick').value = localStorage.getItem('gname') || '';
/* localStorage (not session): re-opening the invite link in a NEW tab must reclaim my seat */
if(!localStorage.getItem('gtoken')) localStorage.setItem('gtoken', crypto.randomUUID());
const TOKEN = localStorage.getItem('gtoken');

/* ---- state ---- */
let ws=null, room=null, myRole=0, board=new Array(CELLS).fill(0),
    turn=1, winner=0, winLine=null, seats={1:null,2:null}, lastMove=-1, inGame=false,
    retry=0, reconnT=null, pingT=null;
let MODE='omok', selMode='omok', timerIv=null,
    DRAW={phase:'lobby',roundEnd:0,youDrawer:false,word:null,mask:''},
    tool={c:0,w:4},
    AL={stones:[],turn:1,winner:0,phase:'idle',auth:'[]',mine:false};

/* ---- lobby ---- */
const CODE_CHARS='ABCDEFGHJKMNPQRSTUVWXYZ23456789';
const newCode=()=>Array.from({length:5},()=>CODE_CHARS[Math.random()*CODE_CHARS.length|0]).join('');
function myName(){ const n=$('nick').value.trim().slice(0,12); if(!n){ $('nick').focus(); return null; }
  localStorage.setItem('gname',n); return n; }
document.querySelectorAll('#gamesList button.gitem').forEach(b=>{
  b.onclick=()=>{ selMode=b.dataset.mode;
    document.querySelectorAll('#gamesList .gitem').forEach(x=>x.classList.toggle('sel',x===b)); };
});
$('btnNew').onclick=()=>{ if(!myName())return; enter(newCode()); };
$('btnJoin').onclick=()=>{ if(!myName())return; const c=$('code').value.trim().toUpperCase();
  if(!/^[A-Z0-9]{4,8}$/.test(c)){ $('code').focus(); return; } enter(c); };
$('code').addEventListener('keydown',e=>{ if(e.key==='Enter') $('btnJoin').click(); });

function enter(code){ room=code; location.hash=code; inGame=true;
  board=new Array(CELLS).fill(0); turn=1; winner=0; winLine=null; lastMove=-1; hover=-1;   // reset per-room state
  seats={1:null,2:null}; myRole=0; retry=0; clearReconn(); $('log').innerHTML='';
  DRAW={phase:'lobby',roundEnd:0,youDrawer:false,word:null,mask:''};
  AL={stones:[],turn:1,winner:0,phase:'idle',auth:'[]',mine:false}; stopAsim();
  setMode(selMode);                              // provisional; the server state message corrects it
  $('lobby').classList.add('hidden'); $('game').classList.remove('hidden');
  $('roomcode').textContent=code; ui(); connect(); draw(); if(MODE==='draw') clearDrawCanvas(); }
function leave(){ inGame=false; clearReconn(); stopPing();
  if(ws){ try{ ws.onclose=null; ws.close(); }catch(e){} } ws=null; room=null;
  history.replaceState(null,'',location.pathname);
  $('game').classList.add('hidden'); $('lobby').classList.remove('hidden'); }
$('btnLeave').onclick=leave;
$('btnCopy').onclick=async()=>{ try{ await navigator.clipboard.writeText(location.origin+location.pathname+'#'+room);
  $('btnCopy').textContent='✓ 복사됨'; setTimeout(()=>$('btnCopy').textContent='🔗 초대링크 복사',1200);}catch(e){} };

/* ---- websocket ---- */
function clearReconn(){ if(reconnT){ clearTimeout(reconnT); reconnT=null; } }
function stopPing(){ if(pingT){ clearInterval(pingT); pingT=null; } }
function connect(){
  clearReconn();
  if(ws){ try{ ws.onclose=null; ws.onmessage=null; ws.close(); }catch(e){} }   // never leave an orphan socket behind
  const proto=location.protocol==='https:'?'wss':'ws';
  const sock=new WebSocket(proto+'://'+location.host+'/ws/'+room); ws=sock;
  sock.onopen=()=>{ if(sock!==ws) return; retry=0;
    sock.send(JSON.stringify({t:'join',name:$('nick').value.trim().slice(0,12),token:TOKEN,mode:selMode}));
    stopPing(); pingT=setInterval(()=>{ if(sock===ws&&sock.readyState===1) sock.send('ping'); },30000); };  // keepalive (answered by the DO runtime)
  sock.onmessage=e=>{ if(sock!==ws) return; let m; try{m=JSON.parse(e.data);}catch(err){return;}
    if(m&&typeof m==='object') handle(m); };
  sock.onclose=()=>{ if(sock!==ws) return; stopPing();
    if(!inGame) return;
    if(++retry>8){ log('sys','접속 실패 — 방이 가득 찼거나 서버 문제예요. 나갔다가 다시 들어와 보세요.'); return; }
    log('sys','연결 끊김 — 재접속 중…');
    reconnT=setTimeout(()=>{ reconnT=null; if(inGame) connect(); }, Math.min(15000,1300*retry)); };
}
function send(o){ if(ws&&ws.readyState===1) ws.send(JSON.stringify(o)); }

function handle(m){
  /* ---- draw mode ---- */
  if(m.t==='state'&&m.mode==='draw'){ setMode('draw');
    DRAW={phase:m.phase,roundEnd:m.roundEnd,youDrawer:m.youDrawer,word:m.word,mask:m.mask};
    renderScores(m.players); clearDrawCanvas(); (m.strokes||[]).forEach(paintStroke);
    drawUiSync(); log('sys', m.phase==='drawing'?'라운드 진행 중!':'🎨 그림그리기 — 단어를 그림으로!'); return; }
  if(m.t==='round'){ DRAW={phase:'drawing',roundEnd:m.roundEnd,youDrawer:m.you,word:m.word,mask:m.mask};
    clearDrawCanvas(); renderScores(m.players); drawUiSync();
    log('sys',`라운드 ${m.roundN} — ${m.drawer}님이 그립니다${m.you?' (당신!)':''}`); return; }
  if(m.t==='stroke'){ paintStroke(m); return; }
  if(m.t==='clear'){ clearDrawCanvas(); return; }
  if(m.t==='correct'){ renderScores(m.players); log('sys',`🎉 ${m.name} 정답!`); return; }
  if(m.t==='reveal'){ DRAW.phase='reveal'; DRAW.word=m.word; DRAW.roundEnd=Date.now()+6000;
    renderScores(m.players); drawUiSync();
    log('sys',`⏰ 정답은 「${m.word}」${m.reason==='all'?' — 전원 정답!':m.reason==='drawer-left'?' (출제자 퇴장)':''}`); return; }
  if(m.t==='phase'){ DRAW.phase=m.phase; if(m.players)renderScores(m.players); drawUiSync(); return; }
  if(m.t==='players'){ renderScores(m.players); return; }
  /* ---- alka ---- */
  if(m.t==='state'&&m.mode==='alka'){ setMode('alka'); stopAsim();
    seats=m.seats; myRole=m.role;
    AL={stones:m.stones.map(s=>({x:s.x,y:s.y,o:s.o,a:s.a,vx:0,vy:0})), turn:m.turn, winner:m.winner,
        phase:m.phase||'idle', auth:JSON.stringify(m.stones), mine:false};
    aui(); arender();
    log('sys', myRole? `당신은 ${myRole===1?'흑(아래)':'백(위)'} — 라운드 ${m.round}. 내 돌을 당겨서 튕기세요!` : '관전 모드'); return; }
  if(m.t==='flick'){ if(MODE!=='alka')return; const s=AL.stones[m.i]; if(!s||!s.a)return;
    s.vx=m.vx; s.vy=m.vy; AL.phase='sim'; AL.mine=false; startAsim(); aui(); return; }
  if(m.t==='settle'){ if(MODE!=='alka')return; stopAsim();
    m.stones.forEach((s,k)=>{ const t=AL.stones[k]; t.x=s.x; t.y=s.y; t.a=s.a; t.vx=0; t.vy=0; });
    AL.turn=m.turn; AL.winner=m.winner; AL.phase='idle'; AL.mine=false; AL.auth=JSON.stringify(m.stones);
    aui(); arender();
    if(m.winner) log('sys',(m.winner===1?'흑':'백')+' 승리! 🏆'); return; }
  if(m.t==='abort'){ if(MODE!=='alka')return; stopAsim();
    JSON.parse(AL.auth).forEach((s,k)=>{ const t=AL.stones[k]; if(t){ t.x=s.x; t.y=s.y; t.a=s.a; t.vx=0; t.vy=0; } });
    AL.phase='idle'; AL.mine=false; aui(); arender(); return; }
  /* ---- omok ---- */
  if(m.t==='state'){ setMode('omok'); board=m.board.split('').map(Number); turn=m.turn; winner=m.winner;
    winLine=m.winLine; seats=m.seats; myRole=m.role;
    lastMove=(typeof m.last==='number'&&m.last>=0&&board[m.last])?m.last:-1; ui(); draw();
    log('sys', myRole? `당신은 ${myRole===1?'흑':'백'}입니다 (라운드 ${m.round})` : '관전 모드'); return; }
  if(m.t==='move'){ board[m.i]=m.stone; turn=m.turn; winner=m.winner; winLine=m.winLine;
    lastMove=m.i; ui(); draw(); return; }
  if(m.t==='roster'){ seats=m.seats; $('watch').textContent=m.watchers?`👀 관전 ${m.watchers}명`:''; ui(); aui(); return; }
  if(m.t==='chat'){ log('chat',m.text,m.name); return; }
  if(m.t==='sys'){ log('sys',m.text); return; }
}

/* ---- ui ---- */
function ui(){
  if(MODE!=='omok') return;
  for(const s of [1,2]){ const el=$('pl'+s), nm=el.querySelector('.nm'), st=el.querySelector('.st');
    const p=seats&&seats[s];
    nm.textContent=p?p.name:'대기 중…';
    st.textContent=p?(p.online?'온라인':'오프라인'):'';
    el.classList.toggle('turn', !winner && turn===s && !!(seats[1]&&seats[2]));
    el.classList.toggle('me', myRole===s); }
  const t=$('turnmsg'); t.className='';
  $('btnRestart').classList.toggle('hidden', !(winner && (myRole===1||myRole===2)));
  $('btnRestart').disabled=false;
  if(winner===3){ t.textContent='무승부!'; t.className='win'; }
  else if(winner){ t.textContent=(winner===myRole?'🏆 승리!':(myRole?'패배…':'게임 종료'))+' — '+(winner===1?'흑':'백')+' 승'; t.className='win'; }
  else if(!(seats&&seats[1]&&seats[2])) t.textContent='상대를 기다리는 중… 초대링크를 보내세요';
  else if(myRole===turn){ t.textContent='● 내 차례'; t.className='me'; }
  else t.textContent=(turn===1?'흑':'백')+' 차례'+(myRole?'':' (관전)');
}
function log(kind,text,name){
  const d=document.createElement('div');
  if(kind==='sys'){ d.className='sys'; d.textContent='· '+text; }
  else{ const n=document.createElement('span'); n.className='nm'; n.textContent=name+'  ';
    d.appendChild(n); d.appendChild(document.createTextNode(text)); }
  $('log').appendChild(d); $('log').scrollTop=$('log').scrollHeight;
  while($('log').childNodes.length>120) $('log').removeChild($('log').firstChild);
}
$('btnSend').onclick=()=>{ const v=$('chat').value.trim(); if(!v)return; send({t:'chat',text:v}); $('chat').value=''; };
$('chat').addEventListener('keydown',e=>{ if(e.key==='Enter') $('btnSend').click(); });
$('btnRestart').onclick=()=>{ $('btnRestart').disabled=true; send({t:'restart'}); };

/* ---- board ---- */
const cv=$('board'), cx=cv.getContext('2d');
const DPR=Math.min(2,window.devicePixelRatio||1), CSS=600, PAD=34;
cv.width=CSS*DPR; cv.height=CSS*DPR; cv.style.width='min(600px,92vw)';
const step=(CSS-PAD*2)/(SIZE-1);
const px=i=>PAD+(i%SIZE)*step, py=i=>PAD+((i/SIZE)|0)*step;
let hover=-1;

function draw(){
  if(MODE!=='omok') return;
  cx.setTransform(DPR,0,0,DPR,0,0);
  const g=cx.createLinearGradient(0,0,CSS,CSS); g.addColorStop(0,'#e2b87e'); g.addColorStop(1,'#c89554');
  cx.fillStyle=g; cx.fillRect(0,0,CSS,CSS);
  cx.strokeStyle='rgba(80,50,20,.55)'; cx.lineWidth=1;
  for(let k=0;k<SIZE;k++){
    cx.beginPath(); cx.moveTo(PAD,PAD+k*step); cx.lineTo(CSS-PAD,PAD+k*step); cx.stroke();
    cx.beginPath(); cx.moveTo(PAD+k*step,PAD); cx.lineTo(PAD+k*step,CSS-PAD); cx.stroke(); }
  cx.fillStyle='rgba(80,50,20,.75)';
  for(const sx of [3,7,11]) for(const sy of [3,7,11]){
    cx.beginPath(); cx.arc(PAD+sx*step,PAD+sy*step,3,0,7); cx.fill(); }
  // hover ghost
  if(hover>=0 && !winner && board[hover]===0 && myRole===turn && seats[1]&&seats[2]){
    cx.globalAlpha=.4; stone(px(hover),py(hover),myRole); cx.globalAlpha=1; }
  // stones
  for(let i=0;i<CELLS;i++) if(board[i]) stone(px(i),py(i),board[i]);
  // last move marker
  if(lastMove>=0 && board[lastMove]){ cx.strokeStyle='#ff6f61'; cx.lineWidth=2;
    cx.beginPath(); cx.arc(px(lastMove),py(lastMove),step*.46,0,7); cx.stroke(); }
  // win line: connect the two farthest-apart cells of the winning row
  if(winLine&&winLine.length>1){
    let a=winLine[0], b=winLine[1], best=-1;
    for(const i of winLine) for(const j of winLine){
      const d=(px(i)-px(j))**2+(py(i)-py(j))**2;
      if(d>best){ best=d; a=i; b=j; } }
    cx.strokeStyle='rgba(255,111,97,.9)'; cx.lineWidth=4; cx.lineCap='round';
    cx.beginPath(); cx.moveTo(px(a),py(a)); cx.lineTo(px(b),py(b)); cx.stroke(); }
}
function stone(x,y,v){
  const r=step*.42, gr=cx.createRadialGradient(x-r*.35,y-r*.4,r*.1,x,y,r);
  if(v===1){ gr.addColorStop(0,'#6a6a78'); gr.addColorStop(1,'#0a0a12'); }
  else{ gr.addColorStop(0,'#ffffff'); gr.addColorStop(1,'#c3c7d4'); }
  cx.fillStyle=gr; cx.beginPath(); cx.arc(x,y,r,0,7); cx.fill();
  cx.strokeStyle='rgba(0,0,0,.35)'; cx.lineWidth=.8; cx.stroke();
}
function cellAt(e){
  const rect=cv.getBoundingClientRect(), scale=CSS/rect.width;
  const mx=(e.clientX-rect.left)*scale, my=(e.clientY-rect.top)*scale;
  const gx=Math.round((mx-PAD)/step), gy=Math.round((my-PAD)/step);
  if(gx<0||gx>=SIZE||gy<0||gy>=SIZE) return -1;
  if(Math.abs(mx-(PAD+gx*step))>step*.45||Math.abs(my-(PAD+gy*step))>step*.45) return -1;
  return gy*SIZE+gx;
}
cv.addEventListener('mousemove',e=>{ if(MODE!=='omok')return; const i=cellAt(e); if(i!==hover){ hover=i; draw(); } });
cv.addEventListener('mouseleave',()=>{ if(MODE!=='omok')return; hover=-1; draw(); });
cv.addEventListener('click',e=>{ if(MODE!=='omok')return; const i=cellAt(e);
  if(i<0||winner||board[i]!==0||myRole!==turn||!(seats[1]&&seats[2])) return;
  send({t:'move',i}); });

/* ---- draw mode (그림그리기) ---- */
const DCOL=['#111827','#e02d2d','#2563eb','#16a34a','#f59e0b','#9333ea','#8b5a2b','#ffffff'];
function setMode(mo){ MODE=mo; const dr=mo==='draw';
  $('pl1').classList.toggle('hidden',dr); $('pl2').classList.toggle('hidden',dr);
  $('scores').classList.toggle('hidden',!dr); $('wordbar').classList.toggle('hidden',!dr);
  $('chat').placeholder=dr?'정답 입력…':'채팅…';
  $('btnRestart').textContent = mo==='alka' ? '↻ 새 판 (선공 교대)' : '↻ 새 판 (흑백 교대)';
  if(mo!=='alka') stopAsim();
  if(dr){ $('btnRestart').classList.add('hidden'); }
  else{ $('tools').classList.add('hidden'); $('btnBegin').classList.add('hidden'); stopTimer(); } }
function drawUiSync(){ if(MODE!=='draw') return;
  const d=DRAW, ing=d.phase==='drawing';
  $('tools').classList.toggle('hidden', !(ing&&d.youDrawer));
  $('btnBegin').classList.toggle('hidden', ing||d.phase==='reveal');
  $('wordtxt').textContent = ing ? (d.youDrawer?('✏️ '+d.word):(d.mask||'')) :
    d.phase==='reveal' ? ('정답: '+(d.word||'')) : '2명 이상 모이면 시작할 수 있어요';
  $('turnmsg').textContent = ing ? (d.youDrawer?'그릴 차례!':'맞혀보세요!') : '';
  $('turnmsg').className = ing&&d.youDrawer ? 'me' : '';
  startTimer(); }
function startTimer(){ stopTimer(); timerIv=setInterval(tickTimer,400); tickTimer(); }
function stopTimer(){ if(timerIv){ clearInterval(timerIv); timerIv=null; } $('timer').textContent=''; }
function tickTimer(){ if(MODE!=='draw'||DRAW.phase==='lobby'){ $('timer').textContent=''; return; }
  const s=Math.max(0,Math.ceil((DRAW.roundEnd-Date.now())/1000));
  $('timer').textContent = DRAW.phase==='drawing' ? ('⏱ '+s+'초') : ('다음 라운드 '+s+'초'); }
function renderScores(list){ const el=$('scores'); el.innerHTML='';
  (list||[]).slice().sort((a,b)=>b.score-a.score).forEach(p=>{
    const d=document.createElement('div'); d.className='sc'+(p.online?'':' off')+(p.drawer?' drawer':'');
    const nm=document.createElement('span'); nm.textContent=(p.drawer?'✏️ ':'')+p.name;
    const pt=document.createElement('span'); pt.className='pt'; pt.textContent=p.score;
    d.appendChild(nm); d.appendChild(pt); el.appendChild(d); }); }
function clearDrawCanvas(){ if(MODE!=='draw')return;
  cx.setTransform(DPR,0,0,DPR,0,0); cx.fillStyle='#ffffff'; cx.fillRect(0,0,CSS,CSS); }
function paintStroke(s){ if(MODE!=='draw')return; const p=s.p; if(!Array.isArray(p)||p.length<4)return;
  cx.setTransform(DPR,0,0,DPR,0,0); cx.strokeStyle=DCOL[(s.c|0)%DCOL.length];
  cx.lineWidth=s.w||4; cx.lineCap='round'; cx.lineJoin='round';
  cx.beginPath(); cx.moveTo(p[0],p[1]);
  for(let k=2;k<p.length;k+=2) cx.lineTo(p[k],p[k+1]);
  cx.stroke(); }
/* drawer input: local paint + batched relay */
let sketching=false, sbuf=[];
function evPt(e){ const r=cv.getBoundingClientRect();
  return [Math.round((e.clientX-r.left)*CSS/r.width), Math.round((e.clientY-r.top)*CSS/r.height)]; }
cv.addEventListener('pointerdown',e=>{ if(MODE!=='draw'||!DRAW.youDrawer||DRAW.phase!=='drawing')return;
  sketching=true; try{cv.setPointerCapture(e.pointerId);}catch(err){} sbuf=evPt(e); e.preventDefault(); });
cv.addEventListener('pointermove',e=>{ if(!sketching)return; const [x,y]=evPt(e);
  const n=sbuf.length; if(n>=2&&Math.abs(sbuf[n-2]-x)<2&&Math.abs(sbuf[n-1]-y)<2)return;
  sbuf.push(x,y); paintStroke({p:sbuf.slice(-4),c:tool.c,w:tool.w});
  if(sbuf.length>=28) flushStroke(false); });
['pointerup','pointercancel','pointerleave'].forEach(ev=>cv.addEventListener(ev,()=>{ if(sketching){ flushStroke(true); sketching=false; } }));
function flushStroke(end){
  if(sbuf.length>=4) send({t:'stroke',p:sbuf,c:tool.c,w:tool.w});
  else if(end&&sbuf.length===2){ const p=[sbuf[0],sbuf[1],sbuf[0]+1,sbuf[1]+1];   // dot
    paintStroke({p,c:tool.c,w:tool.w}); send({t:'stroke',p,c:tool.c,w:tool.w}); }
  sbuf=end?[]:sbuf.slice(-2); }
/* tools */
(function buildTools(){ const t=$('tools');
  DCOL.forEach((c,i)=>{ const b=document.createElement('button'); b.type='button';
    b.className='sw'+(i===0?' on':''); b.style.background=c; if(i===DCOL.length-1) b.title='지우개';
    b.onclick=()=>{ tool.c=i; t.querySelectorAll('.sw').forEach((x,xi)=>x.classList.toggle('on',xi===i)); };
    t.appendChild(b); });
  [4,9,18].forEach((w,i)=>{ const b=document.createElement('button'); b.type='button';
    b.className='wd'+(i===0?' on':'');
    b.innerHTML=`<span style="display:block;width:${6+i*5}px;height:${6+i*5}px;border-radius:50%;background:currentColor"></span>`;
    b.onclick=()=>{ tool.w=w; t.querySelectorAll('.wd').forEach(x=>x.classList.toggle('on',x===b)); };
    t.appendChild(b); });
  const cl=document.createElement('button'); cl.type='button'; cl.className='btn';
  cl.style.cssText='padding:5px 12px;font-size:12px;margin-left:auto';
  cl.textContent='🧹 전체 지우기'; cl.onclick=()=>{ send({t:'clear'}); clearDrawCanvas(); };
  t.appendChild(cl); })();
$('btnBegin').onclick=()=>send({t:'begin'});

/* ---- alka mode (알까기): turn player's client simulates, broadcasts result ---- */
const AR=16, AB0=30, AB1=570;         // stone radius, board bounds (600x600 canvas)
let asimId=null, alast=0, aim=null;   // aim: {i,x0,y0,x,y} while dragging
function aui(){ if(MODE!=='alka')return;
  for(const s of [1,2]){ const el=$('pl'+s), nm=el.querySelector('.nm'), st=el.querySelector('.st');
    const p=seats&&seats[s], n=AL.stones.filter(t=>t.a&&t.o===s).length;
    nm.textContent=p?p.name:'대기 중…';
    st.textContent=p?((p.online?'온라인':'오프라인')+' · '+n+'개'):'';
    el.classList.toggle('turn', !AL.winner && AL.turn===s && !!(seats[1]&&seats[2]) && AL.phase==='idle');
    el.classList.toggle('me', myRole===s); }
  const t=$('turnmsg'); t.className='';
  $('btnRestart').classList.toggle('hidden', !(AL.winner&&(myRole===1||myRole===2)));
  $('btnRestart').disabled=false;
  if(AL.winner){ t.textContent=(AL.winner===myRole?'🏆 승리!':(myRole?'패배…':'게임 종료'))+' — '+(AL.winner===1?'흑':'백')+' 승'; t.className='win'; }
  else if(!(seats&&seats[1]&&seats[2])) t.textContent='상대를 기다리는 중… 초대링크를 보내세요';
  else if(AL.phase==='sim') t.textContent='돌 굴러가는 중…';
  else if(myRole===AL.turn){ t.textContent='● 내 차례 — 내 돌을 당겨서 발사!'; t.className='me'; }
  else t.textContent=(AL.turn===1?'흑':'백')+' 차례'+(myRole?'':' (관전)');
}
function alkaPhys(st,dt){              // fixed-substep integration + equal-mass elastic collisions
  let moving=false;
  const FR=Math.pow(0.28,dt);          // friction: velocity decays to 28%/s
  for(const s of st){ if(!s.a) continue;
    s.x+=s.vx*dt; s.y+=s.vy*dt; s.vx*=FR; s.vy*=FR;
    if(Math.hypot(s.vx,s.vy)<5){ s.vx=0; s.vy=0; }
    if(s.x<AB0-8||s.x>AB1+8||s.y<AB0-8||s.y>AB1+8){ s.a=0; s.vx=0; s.vy=0; }   // off the board
    if(s.vx||s.vy) moving=true; }
  for(let i=0;i<st.length;i++)for(let j=i+1;j<st.length;j++){
    const a=st[i],b=st[j]; if(!a.a||!b.a)continue;
    const dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy);
    if(d>0&&d<AR*2){ const nx=dx/d,ny=dy/d,ov=(AR*2-d)/2;
      a.x-=nx*ov; a.y-=ny*ov; b.x+=nx*ov; b.y+=ny*ov;
      const vn=(b.vx-a.vx)*nx+(b.vy-a.vy)*ny;
      if(vn<0){ const imp=-(1+0.92)*vn/2;
        a.vx-=imp*nx; a.vy-=imp*ny; b.vx+=imp*nx; b.vy+=imp*ny; moving=true; } } }
  return moving;
}
/* interval-driven (not rAF): keeps simulating even in hidden/throttled tabs, so the
   flicker still sends `settle` if they background the tab mid-shot */
function startAsim(){ if(asimId)return; alast=performance.now(); asimId=setInterval(astep,16); }
function stopAsim(){ if(asimId){ clearInterval(asimId); asimId=null; } }
function astep(){
  const now=performance.now();
  const dt=Math.min(2,(now-alast)/1000)||0.016; alast=now;   // process FULL elapsed time (throttled tabs stay real-time)
  let moving=false; const sub=Math.max(1,Math.ceil(dt/(1/120)));
  for(let k=0;k<sub;k++) moving=alkaPhys(AL.stones,dt/sub)||moving;
  arender();
  if(!moving){ stopAsim(); AL.phase='idle';
    if(AL.mine){ AL.mine=false;
      send({t:'settle', stones:AL.stones.map(s=>[Math.round(s.x),Math.round(s.y),s.a?1:0])}); }
    aui(); }
}
function arender(){ if(MODE!=='alka')return;
  cx.setTransform(DPR,0,0,DPR,0,0);
  const g=cx.createLinearGradient(0,0,CSS,CSS); g.addColorStop(0,'#e2b87e'); g.addColorStop(1,'#c89554');
  cx.fillStyle=g; cx.fillRect(0,0,CSS,CSS);
  cx.strokeStyle='rgba(80,50,20,.35)'; cx.lineWidth=1;                   // goban-ish grid
  for(let k=0;k<=8;k++){ const p=AB0+k*(AB1-AB0)/8;
    cx.beginPath(); cx.moveTo(AB0,p); cx.lineTo(AB1,p); cx.stroke();
    cx.beginPath(); cx.moveTo(p,AB0); cx.lineTo(p,AB1); cx.stroke(); }
  cx.strokeStyle='rgba(80,50,20,.8)'; cx.lineWidth=3;                    // board edge = out line
  cx.strokeRect(AB0,AB0,AB1-AB0,AB1-AB0);
  for(const s of AL.stones){ if(!s.a)continue;
    const r=AR, gr=cx.createRadialGradient(s.x-r*.35,s.y-r*.4,r*.1,s.x,s.y,r);
    if(s.o===1){ gr.addColorStop(0,'#6a6a78'); gr.addColorStop(1,'#0a0a12'); }
    else{ gr.addColorStop(0,'#ffffff'); gr.addColorStop(1,'#c3c7d4'); }
    cx.fillStyle=gr; cx.beginPath(); cx.arc(s.x,s.y,r,0,7); cx.fill();
    cx.strokeStyle='rgba(0,0,0,.35)'; cx.lineWidth=.8; cx.stroke(); }
  if(aim){ const dx=aim.x0-aim.x, dy=aim.y0-aim.y, p=Math.hypot(dx,dy);   // slingshot arrow
    if(p>6){ const cap=Math.min(1,p/320);
      cx.strokeStyle=`rgba(255,${Math.round(200-120*cap)},80,.9)`; cx.lineWidth=4; cx.lineCap='round';
      cx.beginPath(); cx.moveTo(aim.x0,aim.y0); cx.lineTo(aim.x0+dx*1.1,aim.y0+dy*1.1); cx.stroke();
      cx.setLineDash([5,6]); cx.strokeStyle='rgba(255,255,255,.5)'; cx.lineWidth=2;
      cx.beginPath(); cx.moveTo(aim.x0,aim.y0); cx.lineTo(aim.x,aim.y); cx.stroke(); cx.setLineDash([]); } }
}
cv.addEventListener('pointerdown',e=>{ if(MODE!=='alka')return;
  if(AL.winner||AL.phase!=='idle'||myRole!==AL.turn||!(seats[1]&&seats[2]))return;
  const [x,y]=evPt(e); let best=-1,bd=1e9;
  AL.stones.forEach((s,i)=>{ if(!s.a||s.o!==myRole)return;
    const d=Math.hypot(s.x-x,s.y-y); if(d<bd){bd=d;best=i;} });
  if(best<0||bd>AR*1.8)return;
  aim={i:best,x0:AL.stones[best].x,y0:AL.stones[best].y,x,y};
  try{cv.setPointerCapture(e.pointerId);}catch(err){} e.preventDefault(); arender(); });
cv.addEventListener('pointermove',e=>{ if(MODE!=='alka'||!aim)return;
  const [x,y]=evPt(e); aim.x=x; aim.y=y; arender(); });
function flickStone(i,vx,vy){                    // my shot: local sim is authoritative -> settle
  const s=AL.stones[i]; if(!s||!s.a)return;
  s.vx=vx; s.vy=vy; AL.phase='sim'; AL.mine=true;
  send({t:'flick',i,vx:Math.round(vx),vy:Math.round(vy)});
  startAsim(); aui(); }
['pointerup','pointercancel'].forEach(ev=>cv.addEventListener(ev,()=>{ if(MODE!=='alka'||!aim)return;
  const dx=aim.x0-aim.x, dy=aim.y0-aim.y, p=Math.hypot(dx,dy), i=aim.i; aim=null;
  if(p<12){ arender(); return; }
  const v=Math.min(1200,p*3.2);
  flickStone(i, dx/p*v, dy/p*v); }));

/* auto-join via #CODE (last: everything above must be initialized) */
(function(){ const h=location.hash.replace('#','').toUpperCase();
  if(/^[A-Z0-9]{4,8}$/.test(h)){ if($('nick').value.trim()) enter(h); else $('code').value=h; } })();
</script>
